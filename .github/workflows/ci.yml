name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  NODE_VERSION: '20.x'

jobs:
  # ========== Job 1: Lint & Type Check ==========
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        workspace: [frontend, backend]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: 🔍 Run linter (Frontend only)
        if: matrix.workspace == 'frontend'
        working-directory: ${{ matrix.workspace }}
        run: npm run lint
        continue-on-error: true

      - name: 🔎 Type check
        working-directory: ${{ matrix.workspace }}
        run: npm run type-check || npx tsc --noEmit

  # ========== Job 2: Build Frontend ==========
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: 📊 Check build size
        working-directory: frontend
        run: |
          echo "### 📦 Build Size Report" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Top 10 Largest Files:" >> $GITHUB_STEP_SUMMARY
          find dist/ -type f -exec du -h {} \; | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ========== Job 3: Build Backend ==========
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: backend
        run: npm ci

      - name: 🏗️ Build backend
        working-directory: backend
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7

  # ========== Job 4: Build Docker Images ==========
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    
    strategy:
      matrix:
        service: [frontend, backend]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          target: production
          push: false
          tags: resumenest-${{ matrix.service }}:pr-${{ github.event.pull_request.number || 'test' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📊 Image size report
        run: |
          echo "### 🐳 Docker Image: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          docker images resumenest-${{ matrix.service }}:pr-${{ github.event.pull_request.number || 'test' }} --format "Size: {{.Size}}" >> $GITHUB_STEP_SUMMARY

  # ========== Job 5: Security Scan ==========
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        workspace: [frontend, backend]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 Run npm audit
        working-directory: ${{ matrix.workspace }}
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ========== Final Status Check ==========
  ci-success:
    name: ✅ CI Pipeline Success
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build-frontend, build-backend, build-docker-images, security-scan]
    if: success()
    
    steps:
      - name: 🎉 All checks passed
        run: |
          echo "### ✅ CI Pipeline Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks have passed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Type checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker images" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security scan" >> $GITHUB_STEP_SUMMARY
