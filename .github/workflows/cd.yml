name: CD Pipeline - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== Job 1: Build & Push Docker Images ==========
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [frontend, backend]
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Log in to Docker Hub (Optional)
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
            ${{ secrets.DOCKERHUB_USERNAME }}/resumenest-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: 📊 Image digest
        run: |
          echo "### 🐳 Published: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ========== Job 2: Deploy to Render ==========
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Trigger Render deployment
        run: |
          echo "🚀 Deploying to Render..."
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render deployment triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL secret not set" >> $GITHUB_STEP_SUMMARY
          fi

  # ========== Job 3: Deploy to AWS EC2 ==========
  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: secrets.EC2_HOST != ''
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.EC2_APP_DIR || '/home/ubuntu/resumenest' }}
            
            # Pull latest code
            git pull origin main
            
            # Pull latest Docker images
            docker compose -f docker-compose.prod.yml pull
            
            # Restart services
            docker compose -f docker-compose.prod.yml up -d
            
            # Clean up old images
            docker image prune -af
            
            echo "✅ Deployment completed successfully!"
          EOF

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: ✅ Deployment summary
        run: |
          echo "### 🎉 Deployed to AWS EC2" >> $GITHUB_STEP_SUMMARY
          echo "Host: ${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date)" >> $GITHUB_STEP_SUMMARY

  # ========== Job 4: Deploy to VPS (Generic) ==========
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: secrets.VPS_HOST != ''
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 📦 Copy deployment files
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/
          scp -i ~/.ssh/deploy_key .env.production ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/.env || true

      - name: 🚀 Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            
            # Login to container registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            
            # Restart services with zero downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Health check
            sleep 10
            docker compose -f docker-compose.prod.yml ps
            
            # Cleanup
            docker image prune -af
            docker volume prune -f
            
            echo "✅ Deployment completed!"
          EOF

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: ✅ Deployment summary
        run: |
          echo "### 🎉 Deployed to VPS" >> $GITHUB_STEP_SUMMARY
          echo "Host: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date)" >> $GITHUB_STEP_SUMMARY

  # ========== Job 5: Notify Deployment Status ==========
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-render, deploy-ec2, deploy-vps]
    if: always()
    
    steps:
      - name: 📧 Deployment notification
        run: |
          if [ "${{ needs.deploy-render.result }}" == "success" ] || [ "${{ needs.deploy-ec2.result }}" == "success" ] || [ "${{ needs.deploy-vps.result }}" == "success" ]; then
            echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
            echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "Time: $(date)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please check the logs above for details" >> $GITHUB_STEP_SUMMARY
          fi

      # Optional: Slack notification
      - name: 📱 Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🚀 ResumeNest deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* ✅ Success\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }'
