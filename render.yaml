# render.yaml - ResumeNest mono-repo
services:
  - type: web
    name: resume-backend
    env: node
    branch: main
    plan: free
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    autoDeploy: true

  - type: static
    name: resume-frontend
    env: static
    branch: main
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist   # use frontend/build for CRA
    autoDeploy: true
